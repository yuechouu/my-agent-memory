<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MY-AGENT-MEMORY v2</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
/* ── CSS Variables — Hermes Teal ── */
:root {
  --bg: #041c1c;
  --bg-card: #062525;
  --bg-card-hover: rgba(255,230,203,0.08);
  --mid: #ffe6cb;
  --mid-55: rgba(255,230,203,0.55);
  --mid-35: rgba(255,230,203,0.35);
  --mid-20: rgba(255,230,203,0.20);
  --mid-15: rgba(255,230,203,0.15);
  --mid-08: rgba(255,230,203,0.08);
  --mid-04: rgba(255,230,203,0.04);
  --accent: #ffe6cb;
  --success: #7dd3a8;
  --warning: #f5a623;
  --danger: #ef5350;
  --pin: #f5a623;
  --radius: 8px;
  --font-sans: system-ui, -apple-system, 'Segoe UI', sans-serif;
  --font-mono: 'Cascadia Code', 'JetBrains Mono', 'Consolas', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--mid);
  font: 15px/1.55 var(--font-sans);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Warm glow */
body::before {
  content: '';
  position: fixed;
  top: -30%; left: -20%;
  width: 70%; height: 70%;
  background: radial-gradient(ellipse, rgba(255,189,56,0.12) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

/* Noise texture */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0; opacity: 0.6;
}

.app { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100vh; }

/* ── Header ── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 28px;
  border-bottom: 1px solid var(--mid-15);
  backdrop-filter: blur(12px);
  background: rgba(4,28,28,0.8);
  flex-shrink: 0;
}
.header h1 {
  font-size: 16px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--accent);
}
.header h1 .sep { color: var(--mid-35); }
.header .meta {
  font-size: 12px; color: var(--mid-55);
  display: flex; gap: 16px;
}
.header .meta span { display: flex; align-items: center; gap: 4px; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }

/* ── Layout ── */
.layout { display: flex; flex: 1; overflow: hidden; }

/* ── Sidebar ── */
.sidebar {
  width: 264px; min-width: 264px;
  padding: 20px 16px;
  border-right: 1px solid var(--mid-15);
  overflow-y: auto;
  display: flex; flex-direction: column; gap: 18px;
  backdrop-filter: blur(8px);
  background: rgba(4,28,28,0.5);
  flex-shrink: 0;
}
.sidebar-section h3 {
  font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.12em; color: var(--mid-55);
  margin-bottom: 10px; font-weight: 500;
}
.sidebar select, .sidebar input[type="text"] {
  width: 100%; padding: 8px 10px;
  background: var(--mid-04); border: 1px solid var(--mid-15);
  border-radius: var(--radius); color: var(--mid);
  font: 13px/1 var(--font-sans); outline: none;
  transition: border-color 0.15s; appearance: none;
}
.sidebar select { cursor: pointer; margin-bottom: 8px; }
.sidebar select:focus, .sidebar input:focus { border-color: var(--accent); }

.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.stat-card {
  background: var(--mid-04); border: 1px solid var(--mid-15);
  border-radius: var(--radius); padding: 10px 12px; text-align: center;
}
.stat-card .value { font-size: 22px; font-weight: 600; color: var(--accent); }
.stat-card .label {
  font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--mid-55); margin-top: 2px;
}
.stat-card .value.warn { color: var(--warning); }
.stat-card .value.success { color: var(--success); }
.stat-card .value.info { color: #8bb4f0; }
.stat-card .value.purple { color: #d4a0ff; }

/* ── Main ── */
.main { flex: 1; overflow-y: auto; padding: 20px 28px; display: flex; flex-direction: column; gap: 12px; }

.toolbar {
  display: flex; align-items: center; justify-content: space-between;
  padding-bottom: 12px; border-bottom: 1px solid var(--mid-15);
}
.toolbar h2 {
  font-size: 13px; text-transform: uppercase;
  letter-spacing: 0.1em; font-weight: 500; color: var(--mid-55);
}
.toolbar h2 span { color: var(--accent); font-weight: 600; }
.toolbar-actions { display: flex; gap: 8px; }

/* ── Buttons ── */
.btn {
  padding: 7px 14px; border-radius: var(--radius);
  font: 12px/1 var(--font-sans); text-transform: uppercase;
  letter-spacing: 0.08em; cursor: pointer;
  transition: all 0.15s; border: 1px solid transparent;
}
.btn-ghost { background: transparent; color: var(--mid-55); border-color: var(--mid-15); }
.btn-ghost:hover { color: var(--accent); border-color: var(--accent); }
.btn-primary { background: var(--accent); color: var(--bg); font-weight: 600; }
.btn-primary:hover { opacity: 0.9; }
.btn-info { background: transparent; color: var(--success); border-color: rgba(125,211,168,0.3); }
.btn-info:hover { background: rgba(125,211,168,0.1); }
.btn-danger { background: transparent; color: var(--danger); border-color: rgba(239,83,80,0.3); }
.btn-danger:hover { background: rgba(239,83,80,0.1); }
.btn-sm { padding: 5px 10px; font-size: 11px; }

/* ── Entry Card ── */
.entry-card {
  background: var(--mid-04); border: 1px solid var(--mid-15);
  border-radius: var(--radius); padding: 16px 18px;
  transition: border-color 0.15s, background 0.15s;
  display: flex; gap: 14px; align-items: flex-start;
}
.entry-card:hover { border-color: var(--mid-35); background: var(--mid-08); }
.entry-card.pinned { border-left: 3px solid var(--pin); background: rgba(245,166,35,0.03); }
.entry-card.pinned:hover { background: rgba(245,166,35,0.06); }
.entry-card .cb { flex-shrink: 0; margin-top: 2px; }
.entry-card .cb input { accent-color: var(--accent); cursor: pointer; }
.entry-card .body { flex: 1; min-width: 0; }
.entry-card .row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
.entry-card .title { font-weight: 600; color: var(--accent); font-size: 15px; }
.entry-card .content { color: var(--mid-55); max-height: 42px; overflow: hidden; font-size: 13px; line-height: 1.6; }
.entry-card .meta { font-size: 11px; color: var(--mid-55); margin-top: 8px; display: flex; gap: 16px; flex-wrap: wrap; }
.entry-card .meta span { white-space: nowrap; display: flex; align-items: center; gap: 4px; }
.entry-card .actions { display: flex; gap: 4px; flex-shrink: 0; margin-top: 2px; }

/* ── Badge ── */
.badge {
  font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.08em; padding: 2px 8px;
  border-radius: 4px; font-weight: 500; border: 1px solid;
}
.badge-entity { color: #7dd3a8; border-color: rgba(125,211,168,0.3); background: rgba(125,211,168,0.08); }
.badge-procedural { color: #8bb4f0; border-color: rgba(139,180,240,0.3); background: rgba(139,180,240,0.08); }
.badge-knowledge { color: #d4a0ff; border-color: rgba(212,160,255,0.3); background: rgba(212,160,255,0.08); }
.badge-shared { color: var(--warning); border-color: rgba(245,166,35,0.3); background: rgba(245,166,35,0.08); }
.badge-private { color: var(--mid-55); border-color: var(--mid-15); background: transparent; }
.badge-project { color: #d4a0ff; border-color: rgba(212,160,255,0.3); background: rgba(212,160,255,0.08); }
.badge-hot { color: var(--warning); border-color: rgba(245,166,35,0.4); background: rgba(245,166,35,0.1); }
.badge-promoted { color: var(--success); border-color: rgba(125,211,168,0.3); background: rgba(125,211,168,0.08); }
.badge-raw { color: var(--mid-55); border-color: var(--mid-15); background: transparent; }
.badge-archived { color: var(--danger); border-color: rgba(239,83,80,0.2); background: rgba(239,83,80,0.05); }
.badge-agent { color: #8bb4f0; border: none; background: none; padding: 0; font-size: 11px; }
.badge-vec { color: var(--success); border-color: rgba(125,211,168,0.3); background: rgba(125,211,168,0.08); font-size: 10px; }
.badge-novec { color: var(--mid-35); border-color: var(--mid-08); background: transparent; font-size: 10px; }

/* Entry action buttons */
.entry-card .actions button {
  background: transparent; border: 1px solid var(--mid-15); color: var(--mid-55);
  padding: 5px 12px; font: 11px/1 var(--font-sans); cursor: pointer;
  border-radius: 4px; text-transform: uppercase; letter-spacing: 0.05em;
  transition: all 0.15s;
}
.entry-card .actions button:hover { border-color: var(--accent); color: var(--accent); }
.entry-card .actions button.pin { color: var(--warning); border-color: rgba(245,166,35,0.2); }
.entry-card .actions button.pin:hover { color: var(--warning); border-color: var(--warning); }
.entry-card .actions button.danger { color: var(--danger); border-color: rgba(239,83,80,0.2); }
.entry-card .actions button.danger:hover { color: var(--danger); border-color: var(--danger); background: rgba(239,83,80,0.05); }

/* ── Empty & Loading ── */
.loading, .empty { text-align: center; padding: 60px; color: var(--mid-55); font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; gap: 6px;
  margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--mid-15);
}
.pagination button {
  background: var(--mid-04); border: 1px solid var(--mid-15); color: var(--mid-55);
  padding: 7px 16px; font: 12px/1 var(--font-sans); cursor: pointer;
  border-radius: var(--radius); transition: all 0.15s;
}
.pagination button:hover { border-color: var(--accent); color: var(--accent); }
.pagination button.active { background: var(--mid-08); border-color: var(--accent); color: var(--accent); }
.pagination button:disabled { opacity: 0.3; cursor: default; }
.pagination span { color: var(--mid-55); padding: 7px 10px; font-size: 12px; }

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  z-index: 100; display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.modal {
  background: var(--bg-card); border: 1px solid var(--mid-15);
  border-radius: 12px; padding: 28px;
  width: 580px; max-height: 85vh; overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.modal h3 {
  color: var(--accent); font-size: 16px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--mid-15);
}
.modal .field { margin-bottom: 16px; }
.modal .field label {
  display: block; font-size: 11px; color: var(--mid-55);
  text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px;
}
.modal .field input, .modal .field textarea, .modal .field select {
  width: 100%; background: var(--mid-04); border: 1px solid var(--mid-15);
  border-radius: var(--radius); color: var(--mid);
  padding: 8px 12px; font: 14px/1.4 var(--font-sans); outline: none;
  transition: border-color 0.15s;
}
.modal .field textarea { min-height: 120px; resize: vertical; font-family: var(--font-sans); }
.modal .field input:focus, .modal .field textarea:focus, .modal .field select:focus {
  border-color: var(--accent);
}
.modal .field select { cursor: pointer; appearance: none; }
.modal .btn-row {
  display: flex; gap: 10px; justify-content: flex-end;
  margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--mid-15);
}
.modal .btn-row button {
  padding: 8px 22px; font: 12px/1 var(--font-sans); cursor: pointer;
  border-radius: var(--radius); text-transform: uppercase; letter-spacing: 0.08em;
  transition: all 0.15s;
}
.modal .btn-row .primary { background: var(--accent); border: 1px solid var(--accent); color: var(--bg); font-weight: 600; }
.modal .btn-row .primary:hover { opacity: 0.9; }
.modal .btn-row .cancel { background: transparent; border: 1px solid var(--mid-15); color: var(--mid-55); }
.modal .btn-row .cancel:hover { border-color: var(--accent); color: var(--accent); }

/* ── Toast ── */
.toast-wrap {
  position: fixed; bottom: 24px; right: 24px; z-index: 200;
  display: flex; flex-direction: column; gap: 8px;
}
.toast {
  background: var(--bg-card); border: 1px solid var(--success); color: var(--success);
  padding: 12px 20px; font-size: 13px; font-family: var(--font-sans);
  border-radius: var(--radius); animation: fadeIn 0.2s;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.toast.err { border-color: var(--danger); color: var(--danger); }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ── Bulk bar ── */
.bulk-bar {
  position: sticky; bottom: 0;
  background: var(--bg-card); border: 1px solid var(--mid-15);
  border-radius: var(--radius); padding: 10px 18px;
  display: flex; align-items: center; gap: 10px;
  margin-top: 12px; z-index: 10;
}
.bulk-bar .count { color: var(--mid-55); font-size: 12px; margin-right: 8px; }
.bulk-bar .count .num { color: var(--accent); font-weight: 600; }
.bulk-bar .spacer { flex: 1; }

/* ── Dream/Audit log ── */
.log-list { max-height: 300px; overflow-y:auto; margin-bottom: 16px; }
.log-row {
  border: 1px solid var(--mid-15); border-radius: var(--radius);
  padding: 10px 14px; margin-bottom: 6px;
  background: var(--mid-04);
}
.log-row .log-time { color: var(--accent); font-size: 12px; margin-bottom: 4px; font-family: var(--font-mono); }
.log-row .log-stats { font-size: 12px; color: var(--mid-55); }
.log-row .log-stats span { color: var(--accent); margin: 0 6px; }

/* ── Sort select ── */
.sort-select {
  background: var(--mid-04); border: 1px solid var(--mid-15);
  color: var(--mid-55); padding: 6px 10px; border-radius: var(--radius);
  font: 12px/1 var(--font-sans); cursor: pointer; text-transform: uppercase;
  letter-spacing: 0.05em; appearance: none; outline: none;
}
.sort-select:focus { border-color: var(--accent); }

/* ── Tag graph ── */
.tag-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
.tag-chip {
  background: var(--mid-04); border: 1px solid var(--mid-15);
  border-radius: var(--radius); padding: 6px 12px;
  font-size: 12px; color: var(--mid-55); cursor: pointer;
  transition: all 0.15s;
}
.tag-chip:hover { border-color: var(--accent); color: var(--accent); }
.tag-chip .count { color: var(--accent); font-weight: 600; margin-left: 6px; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--mid-15); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--mid-20); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

/* ── API ── */
async function api(path, { method = 'GET', body } = {}) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  if (!res.ok) {
    const e = await res.json().catch(() => ({ error: `HTTP ${res.status}` }));
    throw new Error(e.error || `Request failed (${res.status})`);
  }
  return res.json();
}

function buildQuery(params) {
  const p = new URLSearchParams();
  for (const [k, v] of Object.entries(params)) if (v) p.set(k, String(v));
  const qs = p.toString();
  return qs ? '?' + qs : '';
}

/* ── Toast ── */
const ToastCtx = React.createContext(null);
function useToast() { return React.useContext(ToastCtx); }

function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const add = useCallback((msg, isErr = false) => {
    const id = Date.now();
    setToasts(t => [...t, { id, msg, isErr }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3000);
  }, []);
  return (
    <ToastCtx.Provider value={add}>
      {children}
      <div className="toast-wrap">
        {toasts.map(t => <div key={t.id} className={`toast${t.isErr ? ' err' : ''}`}>{t.msg}</div>)}
      </div>
    </ToastCtx.Provider>
  );
}

/* ── Header ── */
function Header({ stats }) {
  return (
    <div className="header">
      <h1>My-Agent-Memory <span className="sep">::</span> v2.0.0</h1>
      <div className="meta">
        <span><span className="dot"></span> memory_v2.db</span>
        <span>WAL mode</span>
        <span>{stats && stats.last_dreaming ? `Last dream: ${stats.last_dreaming.substring(0, 16)}` : 'Not yet dreamed'}</span>
      </div>
    </div>
  );
}

/* ── Sidebar ── */
function Sidebar({ filters, setFilters, stats, onSearch, onDreaming, onConflicts, onTagGraph, onPatrol }) {
  const applyFilter = (updates) => {
    setFilters(f => ({ ...f, ...updates }));
    onSearch(updates);
  };
  return (
    <aside className="sidebar">
      <div className="sidebar-section">
        <h3>Filters</h3>
        <select value={filters.agent || ''} onChange={e => applyFilter({ agent: e.target.value })}>
          <option value="">All Agents</option>
          {stats && stats.by_agent && Object.keys(stats.by_agent).map(a =>
            <option key={a} value={a}>{a} ({stats.by_agent[a]})</option>
          )}
        </select>
        <select value={filters.scope || ''} onChange={e => applyFilter({ scope: e.target.value })}>
          <option value="">All Scopes</option>
          <option value="private">private</option>
          <option value="shared">shared</option>
          <option value="project">project</option>
        </select>
        <select value={filters.state || ''} onChange={e => applyFilter({ state: e.target.value })}>
          <option value="">All States</option>
          <option value="raw">raw</option>
          <option value="promoted">promoted</option>
          <option value="hot">hot</option>
          <option value="archived">archived</option>
        </select>
        <select value={filters.memory_type || ''} onChange={e => applyFilter({ memory_type: e.target.value })}>
          <option value="">All Types</option>
          <option value="procedural">procedural</option>
          <option value="entity">entity</option>
          <option value="knowledge">knowledge</option>
        </select>
        <input type="text" placeholder="Search memories..."
          value={filters.q || ''}
          onChange={e => setFilters(f => ({ ...f, q: e.target.value }))}
          onKeyDown={e => e.key === 'Enter' && onSearch()}
          style={{ marginTop: 4 }}
        />
        <button className="btn btn-ghost" style={{ width: '100%', marginTop: 8 }} onClick={onSearch}>Search</button>
      </div>

      <div className="sidebar-section">
        <h3>Statistics</h3>
        {stats && (
          <div className="stats-grid">
            <div className="stat-card"><div className="value">{stats.total}</div><div className="label">Total</div></div>
            <div className="stat-card"><div className="value">{stats.by_state?.hot || 0}</div><div className="label">Hot</div></div>
            <div className="stat-card"><div className="value">{stats.by_state?.raw || 0}</div><div className="label">Raw</div></div>
            <div className="stat-card"><div className="value">{stats.pinned || 0}</div><div className="label">Pinned</div></div>
          </div>
        )}
      </div>

      {stats && stats.by_type && (
        <div className="sidebar-section">
          <h3>By Type</h3>
          <div className="stats-grid">
            <div className="stat-card"><div className="value info">{stats.by_type.procedural || 0}</div><div className="label">Procedural</div></div>
            <div className="stat-card"><div className="value success">{stats.by_type.entity || 0}</div><div className="label">Entity</div></div>
            <div className="stat-card"><div className="value purple">{stats.by_type.knowledge || 0}</div><div className="label">Knowledge</div></div>
            <div className="stat-card">
              <div className="value" style={{ cursor: stats.open_conflicts > 0 ? 'pointer' : 'default', color: stats.open_conflicts > 0 ? 'var(--warning)' : 'var(--mid-55)' }}
                onClick={stats.open_conflicts > 0 ? onConflicts : undefined}>
                {stats.open_conflicts || 0}
              </div>
              <div className="label">Conflicts</div>
            </div>
          </div>
        </div>
      )}

      <button className="btn btn-danger" style={{ width: '100%' }} onClick={onDreaming}>Run Dreaming</button>
      <button className="btn btn-ghost" style={{ width: '100%' }} onClick={onTagGraph}>Tag Graph</button>
      <button className="btn btn-info" style={{ width: '100%' }} onClick={onPatrol}>Patrol</button>
    </aside>
  );
}

/* ── Entry Row ── */
function EntryRow({ entry, onEdit, onPin, onUnpin, onShare, onUnshare, onArchive, onDelete, selected, onToggleSelect }) {
  const p = entry.is_pinned;
  const mt = entry.memory_type || 'knowledge';
  return (
    <div className={`entry-card${p ? ' pinned' : ''}`}>
      <div className="cb">
        <input type="checkbox" checked={selected} onChange={() => onToggleSelect(entry.id)} />
      </div>
      <div className="body">
        <div className="row">
          <span className="title">{entry.title || '(untitled)'}</span>
          <span className={`badge badge-${mt}`}>{mt}</span>
          <span className={`badge badge-${entry.scope || 'private'}`}>{entry.scope || 'private'}</span>
          <span className={`badge badge-${entry.state || 'raw'}`}>{entry.state || 'raw'}</span>
          <span className="badge badge-agent">{entry.owner_agent || ''}</span>
          {entry.embedding
            ? <span className="badge badge-vec" title="Vector indexed">vec</span>
            : <span className="badge badge-novec" title="No vector embedding">no-vec</span>}
        </div>
        <div className="content">{(entry.content || '').substring(0, 250)}</div>
        <div className="meta">
          <span>score: <strong>{(entry.score || 0).toFixed(2)}</strong></span>
          <span>access: <strong>{entry.access_count || 0}</strong></span>
          <span>updated: {(entry.updated_at || '').substring(0, 16)}</span>
        </div>
      </div>
      <div className="actions">
        <button onClick={() => onEdit(entry)}>Edit</button>
        {p
          ? <button className="pin" onClick={() => onUnpin(entry.id)}>Unpin</button>
          : <button className="pin" onClick={() => onPin(entry.id)}>Pin</button>}
        {entry.scope === 'private'
          ? <button onClick={() => onShare(entry.id)}>Share</button>
          : <button onClick={() => onUnshare(entry.id)}>Unshare</button>}
        <button className="danger" onClick={() => onArchive(entry.id)}>Archive</button>
        {entry.state === 'archived' && (
          <button className="danger" onClick={() => onDelete(entry.id)} style={{ borderColor: 'var(--danger)', color: 'var(--danger)' }}>Delete</button>
        )}
      </div>
    </div>
  );
}

/* ── Pagination ── */
function Pagination({ page, pages, total, onPage }) {
  if (pages <= 1) return null;
  return (
    <div className="pagination">
      <button disabled={page <= 1} onClick={() => onPage(page - 1)}>Prev</button>
      {Array.from({ length: pages }, (_, i) => i + 1).map(p =>
        <button key={p} className={p === page ? 'active' : ''} onClick={() => onPage(p)}>{p}</button>
      )}
      <button disabled={page >= pages} onClick={() => onPage(page + 1)}>Next</button>
      <span>{total} entries</span>
    </div>
  );
}

/* ── Entry Modal ── */
function EntryModal({ entry, onClose, onSave }) {
  const [title, setTitle] = useState(entry?.title || '');
  const [content, setContent] = useState(entry?.content || '');
  const [tags, setTags] = useState((entry?.tags || []).join(', '));
  const [scope, setScope] = useState(entry?.scope || 'private');
  const [memoryType, setMemoryType] = useState(entry?.memory_type || 'knowledge');
  const isEdit = !!entry;

  const handleSave = () => {
    const data = {
      title, content,
      tags: tags.split(',').map(t => t.trim()).filter(Boolean),
      scope, memory_type: memoryType,
    };
    onSave(isEdit ? entry.id : null, data);
  };

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <h3>{isEdit ? 'Edit Entry' : 'New Entry'}</h3>
        <div className="field">
          <label>Title</label>
          <input type="text" value={title} onChange={e => setTitle(e.target.value)} maxLength="200" />
        </div>
        <div className="field">
          <label>Content</label>
          <textarea value={content} onChange={e => setContent(e.target.value)} maxLength="10000" />
        </div>
        <div className="field">
          <label>Tags (comma separated)</label>
          <input type="text" value={tags} onChange={e => setTags(e.target.value)} />
        </div>
        <div className="field">
          <label>Memory Type</label>
          <select value={memoryType} onChange={e => setMemoryType(e.target.value)}>
            <option value="knowledge">knowledge</option>
            <option value="procedural">procedural</option>
            <option value="entity">entity</option>
          </select>
        </div>
        <div className="field">
          <label>Scope</label>
          <select value={scope} onChange={e => setScope(e.target.value)}>
            <option value="private">private</option>
            <option value="shared">shared</option>
            <option value="project">project</option>
          </select>
        </div>
        <div className="btn-row">
          <button className="cancel" onClick={onClose}>Cancel</button>
          <button className="primary" onClick={handleSave}>{isEdit ? 'Update' : 'Create'}</button>
        </div>
      </div>
    </div>
  );
}

/* ── Confirm Dialog ── */
function ConfirmDialog({ message, onConfirm, onCancel }) {
  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onCancel()}>
      <div className="modal" style={{ width: 420 }}>
        <h3>Confirm</h3>
        <p style={{ color: 'var(--mid-55)', fontSize: 14, marginBottom: 20 }}>{message}</p>
        <div className="btn-row">
          <button className="cancel" onClick={onCancel}>Cancel</button>
          <button className="primary" style={{ background: 'transparent', borderColor: 'var(--danger)', color: 'var(--danger)' }} onClick={onConfirm}>Confirm</button>
        </div>
      </div>
    </div>
  );
}

/* ── Conflicts Modal ── */
function ConflictsModal({ conflicts, onResolve, onClose }) {
  const [selectedId, setSelectedId] = useState(conflicts.length > 0 ? conflicts[0].id : null);
  const selected = conflicts.find(c => c.id === selectedId) || conflicts[0];

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={{ width: 700, maxWidth: '90vw' }}>
        <h3>Conflicts <span style={{ color: 'var(--warning)' }}>({conflicts.length} open)</span></h3>
        {conflicts.length === 0 ? (
          <p style={{ color: 'var(--mid-55)' }}>No open conflicts.</p>
        ) : (
          <>
            {conflicts.length > 1 && (
              <div style={{ marginBottom: 16, display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                {conflicts.map(c => (
                  <button key={c.id} onClick={() => setSelectedId(c.id)}
                    className="btn btn-sm" style={{
                      borderColor: c.id === selectedId ? 'var(--warning)' : 'var(--mid-15)',
                      color: c.id === selectedId ? 'var(--warning)' : 'var(--mid-55)',
                    }}>
                    #{c.id} sim:{c.similarity?.toFixed(3)}
                  </button>
                ))}
              </div>
            )}
            {selected && (
              <>
                <div style={{ display: 'flex', gap: 12, marginBottom: 16 }}>
                  {[selected.entry_a, selected.entry_b].map((e, i) => (
                    <div key={i} style={{ flex: 1, border: '1px solid var(--mid-15)', borderRadius: 'var(--radius)', padding: 14, background: 'var(--mid-04)' }}>
                      <div style={{ fontSize: 11, color: 'var(--mid-55)', marginBottom: 4 }}>
                        ENTRY {i === 0 ? 'A' : 'B'} #{i === 0 ? selected.entry_a_id : selected.entry_b_id}
                      </div>
                      <div style={{ color: 'var(--accent)', fontWeight: 600, fontSize: 13, marginBottom: 4 }}>
                        {e?.title || '(untitled)'}
                      </div>
                      <div style={{ color: 'var(--mid-55)', fontSize: 12, maxHeight: 80, overflow: 'hidden' }}>
                        {(e?.content || '').substring(0, 200)}
                      </div>
                      <div style={{ fontSize: 11, color: 'var(--mid-35)', marginTop: 6 }}>
                        {e?.owner_agent} · {e?.scope} · score:{e?.score?.toFixed(2)}
                      </div>
                    </div>
                  ))}
                </div>
                <div style={{ fontSize: 12, color: 'var(--mid-55)', marginBottom: 8 }}>
                  Similarity: <strong style={{ color: 'var(--warning)' }}>{(selected.similarity || 0).toFixed(4)}</strong>
                </div>
                <div className="btn-row" style={{ flexWrap: 'wrap' }}>
                  <button className="cancel" onClick={() => onResolve(selected.id, 'keep_both')}>Keep Both</button>
                  <button className="cancel" onClick={() => onResolve(selected.id, 'last_write_wins')}>Last Wins</button>
                  <button className="cancel" onClick={() => onResolve(selected.id, 'dismiss')}>Dismiss</button>
                </div>
              </>
            )}
          </>
        )}
        <div className="btn-row" style={{ marginTop: 16 }}>
          <button className="cancel" onClick={onClose}>Close</button>
        </div>
      </div>
    </div>
  );
}

/* ── Tag Graph Modal ── */
function TagGraphModal({ onClose }) {
  const [stats, setStats] = useState(null);
  const [related, setRelated] = useState(null);
  const [searchTag, setSearchTag] = useState('');

  useEffect(() => {
    api('/api/tag-graph?action=stats').then(setStats).catch(() => {});
  }, []);

  const findRelated = async (tag) => {
    setSearchTag(tag);
    try {
      const r = await api(`/api/tag-graph?action=related&tag=${encodeURIComponent(tag)}`);
      setRelated(r);
    } catch { setRelated(null); }
  };

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={{ width: 640, maxWidth: '90vw' }}>
        <h3>Tag Graph</h3>
        {stats && (
          <div style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 12, color: 'var(--mid-55)', marginBottom: 8 }}>
              {stats.total_pairs} tag pairs tracked
            </div>
            {stats.top_pairs && stats.top_pairs.length > 0 && (
              <>
                <h4 style={{ fontSize: 11, color: 'var(--mid-55)', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: 8 }}>Top Pairs</h4>
                <div className="tag-grid">
                  {stats.top_pairs.slice(0, 12).map((p, i) => (
                    <div key={i} className="tag-chip" onClick={() => findRelated(p.tag_a)}>
                      {p.tag_a} ↔ {p.tag_b}<span className="count">{p.count}</span>
                    </div>
                  ))}
                </div>
              </>
            )}
          </div>
        )}
        <div style={{ marginBottom: 12 }}>
          <input type="text" placeholder="Find related tags..." value={searchTag}
            onChange={e => setSearchTag(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && searchTag && findRelated(searchTag)}
            style={{ width: '100%', padding: '8px 12px', background: 'var(--mid-04)', border: '1px solid var(--mid-15)', borderRadius: 'var(--radius)', color: 'var(--mid)', font: '14px/1 var(--font-sans)', outline: 'none' }}
          />
        </div>
        {related && related.related && (
          <div style={{ marginBottom: 16 }}>
            <h4 style={{ fontSize: 11, color: 'var(--mid-55)', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: 8 }}>
              Related to "{related.tag}"
            </h4>
            <div className="tag-grid">
              {related.related.map((r, i) => (
                <div key={i} className="tag-chip" onClick={() => findRelated(r.tag)}>
                  {r.tag}<span className="count">{r.count}</span>
                </div>
              ))}
            </div>
          </div>
        )}
        <div className="btn-row">
          <button className="cancel" onClick={onClose}>Close</button>
        </div>
      </div>
    </div>
  );
}

/* ── App ── */
function App() {
  const toast = useToast();
  const [stats, setStats] = useState(null);
  const [filters, setFilters] = useState({ agent: '', scope: '', state: '', memory_type: '', q: '' });
  const [data, setData] = useState({ entries: [], total: 0, page: 1, pages: 1 });
  const [modalEntry, setModalEntry] = useState(null);
  const [showNew, setShowNew] = useState(false);
  const [confirm, setConfirm] = useState(null);
  const [loading, setLoading] = useState(true);
  const [showConflicts, setShowConflicts] = useState(false);
  const [conflictsData, setConflictsData] = useState([]);
  const [selectedIds, setSelectedIds] = useState(new Set());
  const [sort, setSort] = useState({ by: '', order: 'desc' });
  const [showDreamLog, setShowDreamLog] = useState(false);
  const [dreamLog, setDreamLog] = useState([]);
  const [showAuditLog, setShowAuditLog] = useState(false);
  const [auditLog, setAuditLog] = useState([]);
  const [showTagGraph, setShowTagGraph] = useState(false);
  const [showPatrol, setShowPatrol] = useState(false);
  const [patrolData, setPatrolData] = useState(null);

  const loadEntries = useCallback(async (page = 1, filterOverrides = {}) => {
    setLoading(true);
    try {
      const merged = { ...filters, ...filterOverrides };
      const params = { page, limit: 10, sort: sort.by, order: sort.order, ...merged };
      const result = await api('/api/entries' + buildQuery(params));
      setData(result);
    } catch (e) { toast(e.message, true); }
    finally { setLoading(false); }
  }, [filters, sort, toast]);

  const loadStats = useCallback(async () => {
    try { setStats(await api('/api/stats')); } catch {}
  }, []);

  useEffect(() => { loadEntries(1); loadStats(); }, []);

  const handleSearch = (overrides = {}) => loadEntries(1, overrides);

  /* ── Actions ── */
  const handleSave = async (id, body) => {
    try {
      if (id) { await api(`/api/entries/${id}`, { method: 'PUT', body }); toast('Entry updated'); }
      else { await api('/api/entries', { method: 'POST', body }); toast('Entry created'); }
      setModalEntry(null); setShowNew(false);
      loadEntries(data.page); loadStats();
    } catch (e) { toast(e.message, true); }
  };

  const handlePin = async (id) => {
    try { await api(`/api/entries/${id}/pin`, { method: 'POST' }); toast('Pinned'); loadEntries(data.page); } catch (e) { toast(e.message, true); }
  };
  const handleUnpin = async (id) => {
    try { await api(`/api/entries/${id}/unpin`, { method: 'POST' }); toast('Unpinned'); loadEntries(data.page); } catch (e) { toast(e.message, true); }
  };
  const handleShare = async (id) => {
    try { await api(`/api/entries/${id}/share`, { method: 'POST' }); toast('Shared'); loadEntries(data.page); loadStats(); } catch (e) { toast(e.message, true); }
  };
  const handleUnshare = async (id) => {
    try { await api(`/api/entries/${id}/unshare`, { method: 'POST' }); toast('Unshared'); loadEntries(data.page); loadStats(); } catch (e) { toast(e.message, true); }
  };
  const handleArchive = (id) => {
    setConfirm({
      message: 'Archive this entry? It will be hidden from search results.',
      onConfirm: async () => {
        try { await api(`/api/entries/${id}/archive`, { method: 'POST' }); toast('Archived'); loadEntries(data.page); loadStats(); } catch (e) { toast(e.message, true); }
        setConfirm(null);
      }
    });
  };
  const handleDelete = (id) => {
    setConfirm({
      message: 'Permanently delete this entry? This cannot be undone.',
      onConfirm: async () => {
        try { await api(`/api/entries/${id}`, { method: 'DELETE' }); toast('Deleted'); loadEntries(data.page); loadStats(); } catch (e) { toast(e.message, true); }
        setConfirm(null);
      }
    });
  };

  const handleDreaming = () => {
    setConfirm({
      message: 'Run dreaming with dry_run=false? This will modify entries based on scoring.',
      onConfirm: async () => {
        try {
          const r = await api('/api/dreaming', { method: 'POST', body: { dry_run: false } });
          toast(`Dreaming: promoted=${r.promoted?.length||0} demoted=${r.demoted?.length||0} archived=${r.archived?.length||0}`);
          loadEntries(data.page); loadStats();
        } catch (e) { toast(e.message, true); }
        setConfirm(null);
      }
    });
  };

  const handleShowConflicts = async () => {
    try { const c = await api('/api/conflicts'); setConflictsData(c || []); setShowConflicts(true); } catch (e) { toast(e.message, true); }
  };

  const handleResolveConflict = async (conflictId, strategy) => {
    try {
      await api(`/api/conflicts/${conflictId}/resolve`, { method: 'POST', body: { strategy } });
      toast(`Conflict #${conflictId}: ${strategy}`);
      const c = await api('/api/conflicts');
      setConflictsData(c || []); loadStats();
      if (!c || c.length === 0) setShowConflicts(false);
    } catch (e) { toast(e.message, true); }
  };

  const handlePatrol = async (includeLearning = false) => {
    try {
      setPatrolData(null);
      setShowPatrol(true);
      const report = await api('/api/patrol', { method: 'POST', body: { include_learning: includeLearning } });
      setPatrolData(report);
      loadStats();
    } catch (e) { toast(e.message, true); }
  };

  const handlePatrolLog = async () => {
    try {
      const data = await api('/api/patrol/log');
      setPatrolData({ type: 'log', ...data });
      setShowPatrol(true);
    } catch (e) { toast(e.message, true); }
  };

  const toggleSelect = (id) => {
    setSelectedIds(prev => { const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n; });
  };
  const toggleAll = () => {
    if (selectedIds.size === data.entries.length) setSelectedIds(new Set());
    else setSelectedIds(new Set(data.entries.map(e => e.id)));
  };

  const bulkAction = async (action) => {
    const ids = [...selectedIds];
    if (ids.length === 0) return;
    setConfirm({
      message: `${action} ${ids.length} entries?`,
      onConfirm: async () => {
        try {
          for (const id of ids) {
            if (action === 'pin') await api(`/api/entries/${id}/pin`, { method: 'POST' });
            else if (action === 'unpin') await api(`/api/entries/${id}/unpin`, { method: 'POST' });
            else if (action === 'share') await api(`/api/entries/${id}/share`, { method: 'POST' });
            else if (action === 'archive') await api(`/api/entries/${id}/archive`, { method: 'POST' });
          }
          toast(`${ids.length} entries ${action}ed`);
          setSelectedIds(new Set()); loadEntries(data.page); loadStats();
        } catch (e) { toast(e.message, true); }
        setConfirm(null);
      }
    });
  };

  const loadDreamLog = async () => {
    try { const log = await api('/api/dreaming-log'); setDreamLog(log || []); setShowDreamLog(true); } catch (e) { toast(e.message, true); }
  };
  const loadAuditLog = async () => {
    try { const log = await api('/api/audit-log'); setAuditLog(log || []); setShowAuditLog(true); } catch (e) { toast(e.message, true); }
  };

  return (
    <div className="app">
      <Header stats={stats} />
      <div className="layout">
        <Sidebar
          filters={filters} setFilters={setFilters}
          stats={stats}
          onSearch={handleSearch}
          onDreaming={handleDreaming}
          onConflicts={handleShowConflicts}
          onTagGraph={() => setShowTagGraph(true)}
          onPatrol={() => handlePatrol(false)}
        />
        <main className="main">
          <div className="toolbar">
            <h2>Entries <span>{data.total}</span></h2>
            <div className="toolbar-actions">
              <select className="sort-select" value={`${sort.by}:${sort.order}`} onChange={e => {
                const [by, order] = e.target.value.split(':');
                setSort({ by, order }); loadEntries(1);
              }}>
                <option value=":desc">Default</option>
                <option value="score:desc">Score ↑</option>
                <option value="score:asc">Score ↓</option>
                <option value="access_count:desc">Access ↑</option>
                <option value="updated_at:desc">Updated ↑</option>
                <option value="title:asc">Title A-Z</option>
              </select>
              <button className="btn btn-ghost" onClick={loadDreamLog}>Dream Log</button>
              <button className="btn btn-ghost" onClick={loadAuditLog}>Audit Log</button>
              <button className="btn btn-primary" onClick={() => setShowNew(true)}>+ New</button>
            </div>
          </div>

          {loading ? (
            <div className="loading">Loading...</div>
          ) : data.entries.length === 0 ? (
            <div className="empty">No entries found matching your filters.</div>
          ) : (
            <>
              <div className="entry-card" style={{ background: 'var(--mid-04)', opacity: 0.7, padding: '10px 18px' }}>
                <div className="cb"><input type="checkbox" checked={selectedIds.size === data.entries.length && data.entries.length > 0} onChange={toggleAll} /></div>
                <div style={{ flex: 1, color: 'var(--mid-55)', fontSize: 12 }}>
                  {selectedIds.size > 0 ? `${selectedIds.size} selected` : `${data.entries.length} entries — tick to select`}
                </div>
              </div>
              {data.entries.map(e => (
                <EntryRow key={e.id} entry={e}
                  selected={selectedIds.has(e.id)}
                  onToggleSelect={toggleSelect}
                  onEdit={setModalEntry}
                  onPin={handlePin} onUnpin={handleUnpin}
                  onShare={handleShare} onUnshare={handleUnshare}
                  onArchive={handleArchive} onDelete={handleDelete}
                />
              ))}
            </>
          )}

          <Pagination page={data.page} pages={data.pages} total={data.total} onPage={p => loadEntries(p)} />

          {selectedIds.size > 0 && (
            <div className="bulk-bar">
              <span className="count"><span className="num">{selectedIds.size}</span> selected</span>
              <button className="btn btn-ghost btn-sm" onClick={() => bulkAction('pin')}>Pin All</button>
              <button className="btn btn-ghost btn-sm" onClick={() => bulkAction('unpin')}>Unpin All</button>
              <button className="btn btn-ghost btn-sm" onClick={() => bulkAction('share')}>Share All</button>
              <button className="btn btn-danger btn-sm" onClick={() => bulkAction('archive')}>Archive All</button>
              <span className="spacer" />
              <button className="btn btn-ghost btn-sm" onClick={() => setSelectedIds(new Set())}>Clear</button>
            </div>
          )}
        </main>
      </div>

      {(modalEntry || showNew) && (
        <EntryModal entry={modalEntry} onClose={() => { setModalEntry(null); setShowNew(false); }} onSave={handleSave} />
      )}
      {confirm && (
        <ConfirmDialog message={confirm.message} onConfirm={confirm.onConfirm} onCancel={() => setConfirm(null)} />
      )}
      {showConflicts && (
        <ConflictsModal conflicts={conflictsData} onResolve={handleResolveConflict} onClose={() => setShowConflicts(false)} />
      )}
      {showTagGraph && <TagGraphModal onClose={() => setShowTagGraph(false)} />}

      {showDreamLog && (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && setShowDreamLog(false)}>
          <div className="modal" style={{ width: 620, maxWidth: '90vw' }}>
            <h3>Dreaming Log</h3>
            <div className="log-list">
              {dreamLog.length === 0 ? (
                <div style={{ color: 'var(--mid-55)', padding: 20, textAlign: 'center' }}>No dreaming runs recorded yet.</div>
              ) : dreamLog.map(d => (
                <div key={d.id} className="log-row">
                  <div className="log-time">{d.run_at}</div>
                  <div className="log-stats">
                    promote:<span>{d.promoted || (d.details?.promoted || 0)}</span>
                    demote:<span>{d.demoted || (d.details?.demoted || 0)}</span>
                    archive:<span>{d.archived || (d.details?.archived || 0)}</span>
                    purge:<span>{d.purged || (d.details?.purged || 0)}</span>
                    conflicts:<span>{d.conflicts_found || 0}</span>
                  </div>
                </div>
              ))}
            </div>
            <div className="btn-row"><button className="cancel" onClick={() => setShowDreamLog(false)}>Close</button></div>
          </div>
        </div>
      )}

      {showAuditLog && (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && setShowAuditLog(false)}>
          <div className="modal" style={{ width: 680, maxWidth: '90vw' }}>
            <h3>Audit Log</h3>
            <div className="log-list">
              {auditLog.length === 0 ? (
                <div style={{ color: 'var(--mid-55)', padding: 20, textAlign: 'center' }}>No operations recorded yet.</div>
              ) : auditLog.map(a => (
                <div key={a.id} className="log-row">
                  <div className="log-time">{a.created_at}</div>
                  <div className="log-stats">
                    <span style={{ color: 'var(--accent)', textTransform: 'uppercase' }}>{a.action}</span>
                    <span>#{a.entry_id}</span>
                    {a.agent_id && <span>[{a.agent_id}]</span>}
                    {a.old_state && <span style={{ color: 'var(--mid-55)' }}>{a.old_state} →</span>}
                    {a.new_state && <span style={{ color: 'var(--accent)' }}>{a.new_state}</span>}
                  </div>
                </div>
              ))}
            </div>
            <div className="btn-row"><button className="cancel" onClick={() => setShowAuditLog(false)}>Close</button></div>
          </div>
        </div>
      )}

      {showPatrol && (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && setShowPatrol(false)}>
          <div className="modal" style={{ width: 620, maxWidth: '90vw' }}>
            <h3>Patrol Report</h3>
            {!patrolData ? (
              <div style={{ color: 'var(--mid-55)', padding: 20, textAlign: 'center' }}>Running patrol...</div>
            ) : patrolData.type === 'log' ? (
              <div>
                <h4>Patrol Log</h4>
                <div className="log-list">
                  {patrolData.logs?.length === 0 ? (
                    <div style={{ color: 'var(--mid-55)', padding: 20, textAlign: 'center' }}>No patrol logs yet.</div>
                  ) : patrolData.logs?.map((log, i) => (
                    <div key={i} className="log-row"><div className="log-time">{log}</div></div>
                  ))}
                </div>
                {patrolData.activity_files?.length > 0 && (
                  <>
                    <h4 style={{ marginTop: 16 }}>Activity Files</h4>
                    <ul>
                      {patrolData.activity_files.map((f, i) => <li key={i}>{f}</li>)}
                    </ul>
                  </>
                )}
              </div>
            ) : (
              <div>
                <div style={{ marginBottom: 16, padding: 12, background: 'var(--mid-08)', borderRadius: 8 }}>
                  <strong>Summary:</strong> {patrolData.summary || 'No summary'}
                </div>
                {patrolData.actions?.length > 0 && (
                  <div style={{ marginBottom: 16 }}>
                    <h4>Actions</h4>
                    <ul>
                      {patrolData.actions.map((a, i) => <li key={i}>{a}</li>)}
                    </ul>
                  </div>
                )}
                {patrolData.promotions?.length > 0 && (
                  <div style={{ marginBottom: 16 }}>
                    <h4>Promotions</h4>
                    <ul>
                      {patrolData.promotions.map((p, i) => (
                        <li key={i}>{p.from} → {p.to} (score: {p.score?.toFixed(2)})</li>
                      ))}
                    </ul>
                  </div>
                )}
                {patrolData.learnings?.length > 0 && (
                  <div style={{ marginBottom: 16 }}>
                    <h4>Learnings</h4>
                    <ul>
                      {patrolData.learnings.map((l, i) => <li key={i}>{l.topic}</li>)}
                    </ul>
                  </div>
                )}
              </div>
            )}
            <div className="btn-row">
              <button className="btn btn-primary" onClick={() => handlePatrol(true)}>Run with Learning</button>
              <button className="cancel" onClick={() => setShowPatrol(false)}>Close</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ToastProvider><App /></ToastProvider>
);
</script>
</body>
</html>
