<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MY-AGENT-MEMORY v2</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0b0e11;color:#c0ffc0;font-family:'Cascadia Code','Consolas','Courier New',monospace;font-size:13.5px;line-height:1.5;padding:28px;min-height:100vh}
/* ── Header ── */
.header{margin-bottom:28px;padding-bottom:14px;border-bottom:1px solid #1a3a1a}
.header h1{font-size:20px;color:#00ff41;font-weight:600;letter-spacing:1px}
.header .sub{font-size:12px;color:#58a858;margin-top:4px}
/* ── Layout ── */
.layout{display:flex;gap:28px;min-height:calc(100vh - 120px)}
.sidebar{width:210px;flex-shrink:0}
.sidebar .section{margin-bottom:22px}
.sidebar .label{font-size:11px;color:#58a858;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.sidebar select,.sidebar input{width:100%;background:#12161a;border:1px solid #1a3a1a;color:#a0e0a0;padding:7px 10px;font-family:inherit;font-size:13px;outline:none;border-radius:0}
.sidebar select:focus,.sidebar input:focus{border-color:#00ff41;background:#1a221a}
.sidebar .btn{width:100%;background:#1a2a1a;border:1px solid #2a4a2a;color:#80e080;padding:9px;font-family:inherit;font-size:12px;cursor:pointer;text-transform:uppercase;letter-spacing:1.5px}
.sidebar .btn:hover{background:#1a3a1a;border-color:#00ff41;color:#00ff41}
.sidebar .btn.danger{border-color:#5a2a2a;color:#e08080;background:#1a1414}
.sidebar .btn.danger:hover{border-color:#ff4444;color:#ff4444;background:#1a1a1a}
.sidebar .divider{height:1px;background:#1a2a1a;margin:18px 0}
.sidebar .stat{font-size:12px;color:#58a858;margin:5px 0}
.sidebar .stat .warn{color:#ff8844}
/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column}
.toolbar{display:flex;align-items:center;gap:14px;margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid #1a3a1a}
.toolbar .title{font-size:15px;color:#00ff41;font-weight:600}
.toolbar .spacer{flex:1}
.toolbar .btn{padding:7px 18px;background:#1a2a1a;border:1px solid #2a4a2a;color:#80e080;font-family:inherit;font-size:12px;cursor:pointer;text-transform:uppercase;letter-spacing:1px}
.toolbar .btn:hover{background:#1a3a1a;border-color:#00ff41;color:#00ff41}
/* ── Entry cards ── */
.entry{border:1px solid #1a2a1a;padding:14px 18px;margin-bottom:8px;display:flex;gap:14px;align-items:flex-start;transition:all .12s}
.entry:hover{border-color:#2a4a2a;background:#0d1418}
.entry.pinned{border-color:#4a3a0a;border-left:3px solid #ffaa00;background:#0d0d08}
.entry.pinned:hover{border-color:#6a5a0a;background:#111108}
.entry .pin-dot{font-size:15px;flex-shrink:0;margin-top:2px;color:#ffaa00}
.entry .bullet{font-size:15px;flex-shrink:0;margin-top:2px;color:#2a4a2a}
.entry .body{flex:1;min-width:0}
.entry .row{display:flex;align-items:center;gap:10px;margin-bottom:5px;flex-wrap:wrap}
.entry .title{font-weight:700;color:#00ff41;font-size:14px}
.entry .badge{font-size:10px;padding:1px 7px;border:1px solid;font-family:inherit;border-radius:0;text-transform:uppercase;letter-spacing:.5px}
.entry .badge.shared{border-color:#00aa44;color:#00aa44}
.entry .badge.private{border-color:#447744;color:#88aa88}
.entry .badge.project{border-color:#6644aa;color:#9988cc}
.entry .badge.hot{border-color:#ffaa00;color:#ffaa00}
.entry .badge.promoted{border-color:#88aa00;color:#aacc00}
.entry .badge.raw{border-color:#447744;color:#88aa88}
.entry .badge.archived{border-color:#884444;color:#cc8888}
.entry .badge.agent{font-size:10px;color:#447744;border:none;padding:0}
.entry .content{color:#6a9a6a;max-height:42px;overflow:hidden;font-size:13px;line-height:1.6}
.entry .meta{font-size:11px;color:#448844;margin-top:6px;display:flex;gap:20px;flex-wrap:wrap}
.entry .meta span{white-space:nowrap}
.entry .actions{display:flex;gap:4px;flex-shrink:0}
.entry .actions button{background:transparent;border:1px solid #2a3a2a;color:#88aa88;padding:5px 12px;font-family:inherit;font-size:11px;cursor:pointer;border-radius:0;text-transform:uppercase;letter-spacing:.5px}
.entry .actions button:hover{border-color:#00ff41;color:#00ff41;background:#1a2a1a}
.entry .actions button.pin{color:#cc8800;border-color:#3a2a0a}
.entry .actions button.pin:hover{color:#ffaa00;border-color:#ffaa00}
.entry .actions button.danger{color:#aa4444;border-color:#3a1a1a}
.entry .actions button.danger:hover{color:#ff4444;border-color:#ff4444;background:#1a1414}
/* ── Empty & loading ── */
.loading{text-align:center;padding:60px;color:#447744;font-size:13px}
.empty{text-align:center;padding:60px;color:#447744;font-size:13px}
/* ── Pagination ── */
.pagination{display:flex;justify-content:center;gap:6px;margin-top:18px;padding-top:14px;border-top:1px solid #1a2a1a}
.pagination button{background:#12161a;border:1px solid #2a3a2a;color:#80c080;padding:7px 16px;font-family:inherit;font-size:12px;cursor:pointer;border-radius:0}
.pagination button:hover{border-color:#00ff41;color:#00ff41}
.pagination button.active{background:#1a2a1a;border-color:#00ff41;color:#00ff41}
.pagination button:disabled{opacity:.3;cursor:default}
.pagination span{color:#58a858;padding:7px 10px;font-size:12px}
/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:#0d1418;border:1px solid #2a4a2a;padding:28px;width:560px;max-height:85vh;overflow-y:auto}
.modal h3{color:#00ff41;font-size:16px;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid #1a2a1a}
.modal .field{margin-bottom:16px}
.modal .field label{display:block;font-size:11px;color:#58a858;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.modal .field input,.modal .field textarea,.modal .field select{width:100%;background:#12161a;border:1px solid #1a3a1a;color:#a0e0a0;padding:8px 12px;font-family:inherit;font-size:13px;outline:none;border-radius:0}
.modal .field textarea{min-height:120px;resize:vertical}
.modal .field input:focus,.modal .field textarea:focus,.modal .field select:focus{border-color:#00ff41;background:#1a221a}
.modal .btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid #1a2a1a}
.modal .btn-row button{padding:8px 22px;font-family:inherit;font-size:12px;cursor:pointer;border-radius:0;text-transform:uppercase;letter-spacing:1px}
.modal .btn-row .primary{background:#1a3a1a;border:1px solid #00ff41;color:#00ff41}
.modal .btn-row .primary:hover{background:#1a5a1a}
.modal .btn-row .cancel{background:transparent;border:1px solid #2a3a2a;color:#88aa88}
.modal .btn-row .cancel:hover{border-color:#00ff41;color:#00ff41}
/* ── Toast ── */
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast{background:#1a2a1a;border:1px solid #00ff41;color:#00ff41;padding:12px 20px;font-size:12px;font-family:inherit;animation:fadeIn .2s}
.toast.err{background:#1a1414;border-color:#ff4444;color:#ff4444}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
/* ── Bulk bar ── */
.bulk-bar{position:sticky;bottom:0;background:#0d1418;border:1px solid #2a4a2a;padding:10px 18px;display:flex;align-items:center;gap:10px;margin-top:12px;z-index:10}
.bulk-bar .count{color:#58a858;font-size:12px;margin-right:8px}
.bulk-bar .count .num{color:#00ff41}
.bulk-bar .spacer{flex:1}
/* ── Dreaming log ── */
.dream-log{max-height:300px;overflow-y:auto;margin-bottom:16px}
.dream-log .log-row{border:1px solid #1a2a1a;padding:10px 14px;margin-bottom:6px}
.dream-log .log-row .log-time{color:#00ff41;font-size:12px;margin-bottom:4px}
.dream-log .log-row .log-stats{font-size:11px;color:#58a858}
.dream-log .log-row .log-stats span{color:#a0e0a0;margin:0 8px}
/* ── Sort ── */
.sort-select{background:#12161a;border:1px solid #2a3a2a;color:#80c080;padding:5px 10px;font-family:inherit;font-size:11px;cursor:pointer;border-radius:0;text-transform:uppercase}
.sort-select:focus{border-color:#00ff41;outline:none}
/* ── Checkbox ── */
.entry .cb{flex-shrink:0;margin-right:0}
.entry .cb input{accent-color:#00ff41;cursor:pointer}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

/* ── API ────────────────────────────────────────── */
async function api(path, { method = 'GET', body } = {}) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  if (!res.ok) {
    const e = await res.json().catch(() => ({ error: `HTTP ${res.status}` }));
    throw new Error(e.error || `Request failed (${res.status})`);
  }
  return res.json();
}

function buildQuery(params) {
  const p = new URLSearchParams();
  for (const [k, v] of Object.entries(params)) if (v) p.set(k, String(v));
  const qs = p.toString();
  return qs ? '?' + qs : '';
}

/* ── Toast context ───────────────────────────────── */
const ToastCtx = React.createContext(null);
function useToast() { return React.useContext(ToastCtx); }

/* ── Toast provider ──────────────────────────────── */
function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const add = useCallback((msg, isErr = false) => {
    const id = Date.now();
    setToasts(t => [...t, { id, msg, isErr }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3000);
  }, []);
  return (
    <ToastCtx.Provider value={add}>
      {children}
      <div className="toast-wrap">
        {toasts.map(t => <div key={t.id} className={`toast${t.isErr ? ' err' : ''}`}>{t.msg}</div>)}
      </div>
    </ToastCtx.Provider>
  );
}

/* ── Header ──────────────────────────────────────── */
function Header({ stats }) {
  return (
    <div className="header">
      <h1>MY-AGENT-MEMORY<span style={{ color: '#447744' }}>::</span>v2.0.0</h1>
      <div className="sub">
        db: memory_v2.db · wal: on
        {stats && stats.last_dreaming
          ? ` · last dreaming: ${stats.last_dreaming.substring(0, 16)}`
          : ' · not yet dreamed'}
      </div>
    </div>
  );
}

/* ── Sidebar ─────────────────────────────────────── */
function Sidebar({ filters, setFilters, stats, onSearch, onDreaming, onConflicts }) {
  const applyFilter = (updates) => {
    setFilters(f => ({ ...f, ...updates }));
    setTimeout(onSearch, 0);
  };
  return (
    <aside className="sidebar">
      <div className="section">
        <div className="label">AGENT</div>
        <select value={filters.agent || ''} onChange={e => applyFilter({ agent: e.target.value })}>
          <option value="">* ALL</option>
          {stats && stats.by_agent && Object.keys(stats.by_agent).map(a =>
            <option key={a} value={a}>{a} ({stats.by_agent[a]})</option>
          )}
        </select>
      </div>
      <div className="section">
        <div className="label">SCOPE</div>
        <select value={filters.scope || ''} onChange={e => applyFilter({ scope: e.target.value })}>
          <option value="">* ALL</option>
          <option value="private">private</option>
          <option value="shared">shared</option>
          <option value="project">project</option>
        </select>
      </div>
      <div className="section">
        <div className="label">STATE</div>
        <select value={filters.state || ''} onChange={e => applyFilter({ state: e.target.value })}>
          <option value="">* ALL</option>
          <option value="raw">raw</option>
          <option value="promoted">promoted</option>
          <option value="hot">hot</option>
          <option value="archived">archived</option>
        </select>
      </div>
      <div className="section">
        <div className="label">SEARCH</div>
        <input
          type="text" placeholder="grep ..."
          value={filters.q || ''}
          onChange={e => setFilters(f => ({ ...f, q: e.target.value }))}
          onKeyDown={e => e.key === 'Enter' && onSearch()}
        />
        <button className="btn" style={{ marginTop: 8 }} onClick={onSearch}>EXEC</button>
      </div>
      <div className="divider" />
      {stats && (
        <>
          <div className="stat">TOTAL: <span style={{ color: '#a0e0a0' }}>{stats.total}</span></div>
          <div className="stat">
            HOT: <span style={{ color: '#a0e0a0' }}>{stats.by_state?.hot || 0}</span>
            {' · '}RAW: <span style={{ color: '#a0e0a0' }}>{stats.by_state?.raw || 0}</span>
            {' · '}COLD: <span style={{ color: '#a0e0a0' }}>{stats.by_state?.archived || 0}</span>
          </div>
          <div className="stat">PINNED: <span style={{ color: '#a0e0a0' }}>{stats.pinned || 0}</span></div>
          {stats.open_conflicts > 0 && (
            <div className="stat clickable" onClick={onConflicts} style={{cursor:'pointer'}}>
              CONFLICTS: <span className="warn">{stats.open_conflicts}</span>
            </div>
          )}
        </>
      )}
      <div className="divider" />
      <button className="btn danger" onClick={onDreaming}>RUN DREAMING</button>
    </aside>
  );
}

/* ── Entry Row ───────────────────────────────────── */
function EntryRow({ entry, onEdit, onPin, onUnpin, onShare, onUnshare, onArchive, onDelete, selected, onToggleSelect }) {
  const p = entry.is_pinned;
  const badge = (label, cls) => <span className={`badge ${cls}`}>{label}</span>;

  return (
    <div className={`entry${p ? ' pinned' : ''}`}>
      <div className="cb">
        <input type="checkbox" checked={selected} onChange={() => onToggleSelect(entry.id)} />
      </div>
      <div className="body">
        <div className="row">
          <span className="title">{entry.title || '(untitled)'}</span>
          {badge(entry.scope || 'private', entry.scope || 'private')}
          {badge(entry.state || 'raw', entry.state || 'raw')}
          <span className="badge agent">{entry.owner_agent || ''}</span>
        </div>
        <div className="content">{(entry.content || '').substring(0, 250)}</div>
        <div className="meta">
          <span>score: <span style={{ color: '#a0e0a0' }}>{(entry.score || 0).toFixed(2)}</span></span>
          <span>access: <span style={{ color: '#a0e0a0' }}>{entry.access_count || 0}</span></span>
          <span>updated: {(entry.updated_at || '').substring(0, 16)}</span>
        </div>
      </div>
      <div className="actions">
        <button onClick={() => onEdit(entry)}>EDIT</button>
        {p
          ? <button className="pin" onClick={() => onUnpin(entry.id)}>UNPIN</button>
          : <button className="pin" onClick={() => onPin(entry.id)}>PIN</button>}
        {entry.scope === 'private'
          ? <button onClick={() => onShare(entry.id)}>SHARE</button>
          : <button onClick={() => onUnshare(entry.id)}>UNSHARE</button>}
        <button className="danger" onClick={() => onArchive(entry.id)}>ARCHIVE</button>
        {entry.state === 'archived' && (
          <button className="danger" onClick={() => onDelete(entry.id)} style={{borderColor:'#ff4444',color:'#ff4444'}}>DELETE</button>
        )}
      </div>
    </div>
  );
}

/* ── Pagination ──────────────────────────────────── */
function Pagination({ page, pages, total, onPage }) {
  if (pages <= 1) return null;
  return (
    <div className="pagination">
      <button disabled={page <= 1} onClick={() => onPage(page - 1)}>PREV</button>
      {Array.from({ length: pages }, (_, i) => i + 1).map(p =>
        <button key={p} className={p === page ? 'active' : ''} onClick={() => onPage(p)}>{p}</button>
      )}
      <button disabled={page >= pages} onClick={() => onPage(page + 1)}>NEXT</button>
      <span>{total} entries</span>
    </div>
  );
}

/* ── Modal ───────────────────────────────────────── */
function EntryModal({ entry, onClose, onSave }) {
  const [title, setTitle] = useState(entry?.title || '');
  const [content, setContent] = useState(entry?.content || '');
  const [tags, setTags] = useState((entry?.tags || []).join(', '));
  const [scope, setScope] = useState(entry?.scope || 'private');
  const isEdit = !!entry;

  const handleSave = () => {
    const data = {
      title, content,
      tags: tags.split(',').map(t => t.trim()).filter(Boolean),
      scope,
    };
    onSave(isEdit ? entry.id : null, data);
  };

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <h3>{isEdit ? 'EDIT ENTRY' : 'NEW ENTRY'}</h3>
        <div className="field">
          <label>Title</label>
          <input type="text" value={title} onChange={e => setTitle(e.target.value)} maxLength="200" />
        </div>
        <div className="field">
          <label>Content</label>
          <textarea value={content} onChange={e => setContent(e.target.value)} maxLength="10000" />
        </div>
        <div className="field">
          <label>Tags (comma separated)</label>
          <input type="text" value={tags} onChange={e => setTags(e.target.value)} />
        </div>
        <div className="field">
          <label>Scope</label>
          <select value={scope} onChange={e => setScope(e.target.value)}>
            <option value="private">private</option>
            <option value="shared">shared</option>
            <option value="project">project</option>
          </select>
        </div>
        <div className="btn-row">
          <button className="cancel" onClick={onClose}>CANCEL</button>
          <button className="primary" onClick={handleSave}>{isEdit ? 'UPDATE' : 'CREATE'}</button>
        </div>
      </div>
    </div>
  );
}

/* ── Confirm dialog ──────────────────────────────── */
function ConfirmDialog({ message, onConfirm, onCancel }) {
  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onCancel()}>
      <div className="modal" style={{ width: 400 }}>
        <h3>CONFIRM</h3>
        <p style={{ color: '#6a9a6a', fontSize: 13, marginBottom: 20 }}>{message}</p>
        <div className="btn-row">
          <button className="cancel" onClick={onCancel}>CANCEL</button>
          <button className="primary" style={{ background: '#1a1414', borderColor: '#ff4444', color: '#ff4444' }} onClick={onConfirm}>CONFIRM</button>
        </div>
      </div>
    </div>
  );
}

/* ── Conflicts modal ─────────────────────────────── */
function ConflictsModal({ conflicts, onResolve, onClose }) {
  const [selectedId, setSelectedId] = useState(conflicts.length > 0 ? conflicts[0].id : null);
  const selected = conflicts.find(c => c.id === selectedId) || conflicts[0];

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={{ width: 680, maxWidth: '90vw' }}>
        <h3>CONFLICTS <span style={{color:'#ff8844'}}>({conflicts.length} open)</span></h3>
        {conflicts.length === 0 ? (
          <p style={{color:'#58a858'}}>No open conflicts.</p>
        ) : (
          <>
            {conflicts.length > 1 && (
              <div style={{marginBottom:16,display:'flex',gap:6,flexWrap:'wrap'}}>
                {conflicts.map(c => (
                  <button key={c.id}
                    onClick={() => setSelectedId(c.id)}
                    style={{
                      padding:'4px 12px',fontSize:11,cursor:'pointer',fontFamily:'inherit',
                      border:`1px solid ${c.id===selectedId?'#ff8844':'#2a3a2a'}`,
                      background:c.id===selectedId?'#1a1a0a':'transparent',
                      color:c.id===selectedId?'#ff8844':'#88aa88'
                    }}>
                    #{c.id} sim:{c.similarity?.toFixed(3)}
                  </button>
                ))}
              </div>
            )}
            {selected && (
              <>
                <div style={{display:'flex',gap:12,marginBottom:16}}>
                  <div style={{flex:1,border:'1px solid #2a3a2a',padding:12}}>
                    <div style={{fontSize:11,color:'#58a858',marginBottom:4}}>ENTRY A #{selected.entry_a_id}</div>
                    <div style={{color:'#00ff41',fontWeight:600,fontSize:13,marginBottom:4}}>
                      {selected.entry_a?.title || '(untitled)'}
                    </div>
                    <div style={{color:'#6a9a6a',fontSize:12,maxHeight:80,overflow:'hidden'}}>
                      {(selected.entry_a?.content || '').substring(0, 200)}
                    </div>
                    <div style={{fontSize:10,color:'#447744',marginTop:6}}>
                      {selected.entry_a?.owner_agent} · {selected.entry_a?.scope} · score:{selected.entry_a?.score?.toFixed(2)}
                    </div>
                  </div>
                  <div style={{flex:1,border:'1px solid #2a3a2a',padding:12}}>
                    <div style={{fontSize:11,color:'#58a858',marginBottom:4}}>ENTRY B #{selected.entry_b_id}</div>
                    <div style={{color:'#00ff41',fontWeight:600,fontSize:13,marginBottom:4}}>
                      {selected.entry_b?.title || '(untitled)'}
                    </div>
                    <div style={{color:'#6a9a6a',fontSize:12,maxHeight:80,overflow:'hidden'}}>
                      {(selected.entry_b?.content || '').substring(0, 200)}
                    </div>
                    <div style={{fontSize:10,color:'#447744',marginTop:6}}>
                      {selected.entry_b?.owner_agent} · {selected.entry_b?.scope} · score:{selected.entry_b?.score?.toFixed(2)}
                    </div>
                  </div>
                </div>
                <div style={{fontSize:11,color:'#58a858',marginBottom:8}}>
                  Similarity: <span style={{color:'#ff8844'}}>{(selected.similarity || 0).toFixed(4)}</span>
                </div>
                <div className="btn-row" style={{flexWrap:'wrap'}}>
                  <button className="cancel" onClick={() => onResolve(selected.id, 'keep_both')}>KEEP BOTH</button>
                  <button className="cancel" onClick={() => onResolve(selected.id, 'last_write_wins')}>LAST WINS</button>
                  <button className="cancel" onClick={() => onResolve(selected.id, 'dismiss')}>DISMISS</button>
                </div>
              </>
            )}
          </>
        )}
        <div className="btn-row" style={{marginTop:16}}>
          <button className="cancel" onClick={onClose}>CLOSE</button>
        </div>
      </div>
    </div>
  );
}

/* ── App ─────────────────────────────────────────── */
function App() {
  const toast = useToast();
  const [stats, setStats] = useState(null);
  const [filters, setFilters] = useState({ agent: '', scope: '', state: '', q: '' });
  const [data, setData] = useState({ entries: [], total: 0, page: 1, pages: 1 });
  const [modalEntry, setModalEntry] = useState(null);
  const [showNew, setShowNew] = useState(false);
  const [confirm, setConfirm] = useState(null);
  const [loading, setLoading] = useState(true);
  const [showConflicts, setShowConflicts] = useState(false);
  const [conflictsData, setConflictsData] = useState([]);
  const [selectedIds, setSelectedIds] = useState(new Set());
  const [sort, setSort] = useState({ by: '', order: 'desc' });
  const [showDreamLog, setShowDreamLog] = useState(false);
  const [dreamLog, setDreamLog] = useState([]);
  const [showAuditLog, setShowAuditLog] = useState(false);
  const [auditLog, setAuditLog] = useState([]);

  const loadEntries = useCallback(async (page = 1) => {
    setLoading(true);
    try {
      const params = { page, limit: 10, sort: sort.by, order: sort.order, ...filters };
      const result = await api('/api/entries' + buildQuery(params));
      setData(result);
    } catch (e) {
      toast(e.message, true);
    } finally {
      setLoading(false);
    }
  }, [filters, toast]);

  const loadStats = useCallback(async () => {
    try {
      setStats(await api('/api/stats'));
    } catch (e) { /* best-effort */ }
  }, []);

  useEffect(() => { loadEntries(1); loadStats(); }, []);

  const handleSearch = () => loadEntries(1);

  /* ── Actions ── */
  const handleSave = async (id, body) => {
    try {
      if (id) {
        await api(`/api/entries/${id}`, { method: 'PUT', body });
        toast('ENTRY UPDATED');
      } else {
        await api('/api/entries', { method: 'POST', body });
        toast('ENTRY CREATED');
      }
      setModalEntry(null);
      setShowNew(false);
      loadEntries(data.page);
      loadStats();
    } catch (e) { toast(e.message, true); }
  };

  const handlePin = async (id) => {
    try { await api(`/api/entries/${id}/pin`, { method: 'POST' }); toast('PINNED'); loadEntries(data.page); } catch (e) { toast(e.message, true); }
  };
  const handleUnpin = async (id) => {
    try { await api(`/api/entries/${id}/unpin`, { method: 'POST' }); toast('UNPINNED'); loadEntries(data.page); } catch (e) { toast(e.message, true); }
  };
  const handleShare = async (id) => {
    try { await api(`/api/entries/${id}/share`, { method: 'POST' }); toast('SHARED'); loadEntries(data.page); loadStats(); } catch (e) { toast(e.message, true); }
  };
  const handleUnshare = async (id) => {
    try { await api(`/api/entries/${id}/unshare`, { method: 'POST' }); toast('UNSHARED'); loadEntries(data.page); loadStats(); } catch (e) { toast(e.message, true); }
  };
  const handleArchive = (id) => {
    setConfirm({
      message: 'Archive this entry? It will be hidden from search results.',
      onConfirm: async () => {
        try { await api(`/api/entries/${id}/archive`, { method: 'POST' }); toast('ARCHIVED'); loadEntries(data.page); loadStats(); } catch (e) { toast(e.message, true); }
        setConfirm(null);
      }
    });
  };

  const handleDelete = (id) => {
    setConfirm({
      message: 'PERMANENTLY DELETE this entry? This cannot be undone.',
      onConfirm: async () => {
        try {
          await api(`/api/entries/${id}`, { method: 'DELETE' });
          toast('DELETED');
          loadEntries(data.page);
          loadStats();
        } catch (e) { toast(e.message, true); }
        setConfirm(null);
      }
    });
  };

  const handleDreaming = () => {
    setConfirm({
      message: 'Run dreaming with dry_run=false? This will modify entries based on scoring.',
      onConfirm: async () => {
        try {
          const r = await api('/api/dreaming', { method: 'POST', body: { dry_run: false } });
          toast(`DREAMING: promoted=${r.promoted?.length || 0} demoted=${r.demoted?.length || 0} archived=${r.archived?.length || 0}`);
          loadEntries(data.page);
          loadStats();
        } catch (e) { toast(e.message, true); }
        setConfirm(null);
      }
    });
  };

  const handleShowConflicts = async () => {
    try {
      const c = await api('/api/conflicts');
      setConflictsData(c || []);
      setShowConflicts(true);
    } catch (e) { toast(e.message, true); }
  };

  const handleResolveConflict = async (conflictId, strategy) => {
    try {
      await api(`/api/conflicts/${conflictId}/resolve`, { method: 'POST', body: { strategy } });
      toast(`CONFLICT #${conflictId}: ${strategy}`);
      const c = await api('/api/conflicts');
      setConflictsData(c || []);
      loadStats();
      if (!c || c.length === 0) setShowConflicts(false);
    } catch (e) { toast(e.message, true); }
  };

  const toggleSelect = (id) => {
    setSelectedIds(prev => { const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n; });
  };

  const toggleAll = () => {
    if (selectedIds.size === data.entries.length) {
      setSelectedIds(new Set());
    } else {
      setSelectedIds(new Set(data.entries.map(e => e.id)));
    }
  };

  const bulkAction = async (action) => {
    const ids = [...selectedIds];
    if (ids.length === 0) return;
    setConfirm({
      message: `${action.toUpperCase()} ${ids.length} entries?`,
      onConfirm: async () => {
        try {
          for (const id of ids) {
            if (action === 'pin') await api(`/api/entries/${id}/pin`, { method: 'POST' });
            else if (action === 'unpin') await api(`/api/entries/${id}/unpin`, { method: 'POST' });
            else if (action === 'share') await api(`/api/entries/${id}/share`, { method: 'POST' });
            else if (action === 'archive') await api(`/api/entries/${id}/archive`, { method: 'POST' });
          }
          toast(`${ids.length} ENTRIES ${action.toUpperCase()}ED`);
          setSelectedIds(new Set());
          loadEntries(data.page);
          loadStats();
        } catch (e) { toast(e.message, true); }
        setConfirm(null);
      }
    });
  };

  const loadDreamLog = async () => {
    try {
      const log = await api('/api/dreaming-log');
      setDreamLog(log || []);
      setShowDreamLog(true);
    } catch (e) { toast(e.message, true); }
  };

  const loadAuditLog = async () => {
    try {
      const log = await api('/api/audit-log');
      setAuditLog(log || []);
      setShowAuditLog(true);
    } catch (e) { toast(e.message, true); }
  };

  return (
    <div>
      <Header stats={stats} />
      <div className="layout">
        <Sidebar
          filters={filters} setFilters={setFilters}
          stats={stats}
          onSearch={handleSearch}
          onDreaming={handleDreaming}
          onConflicts={handleShowConflicts}
        />
        <main className="main">
          <div className="toolbar">
            <span className="title">RESULTS</span>
            <span style={{ color: '#58a858', fontSize: 12 }}>{data.total} entries</span>
            <span className="spacer" />
            <select className="sort-select" value={`${sort.by}:${sort.order}`} onChange={e => {
              const [by, order] = e.target.value.split(':');
              setSort({ by, order });
              loadEntries(1);
            }}>
              <option value=":desc">Default</option>
              <option value="score:desc">Score ↑</option>
              <option value="score:asc">Score ↓</option>
              <option value="access_count:desc">Access ↑</option>
              <option value="updated_at:desc">Updated ↑</option>
              <option value="title:asc">Title A-Z</option>
            </select>
            <button className="btn" onClick={loadDreamLog}>DREAM LOG</button>
            <button className="btn" onClick={loadAuditLog}>AUDIT LOG</button>
            <button className="btn" onClick={() => setShowNew(true)}>+ NEW</button>
          </div>

          {loading ? (
            <div className="loading">Loading...</div>
          ) : data.entries.length === 0 ? (
            <div className="empty">No entries found matching your filters.</div>
          ) : (
            <>
              <div className="entry" style={{background:'#0d1418',opacity:.7}}>
                <div className="cb"><input type="checkbox" checked={selectedIds.size === data.entries.length && data.entries.length > 0} onChange={toggleAll} /></div>
                <div style={{flex:1,color:'#58a858',fontSize:12}}>
                  {selectedIds.size > 0 ? `${selectedIds.size} selected` : `${data.entries.length} entries — tick to select`}
                </div>
              </div>
              {data.entries.map(e => (
                <EntryRow
                  key={e.id} entry={e}
                  selected={selectedIds.has(e.id)}
                  onToggleSelect={toggleSelect}
                  onEdit={setModalEntry}
                  onPin={handlePin} onUnpin={handleUnpin}
                  onShare={handleShare} onUnshare={handleUnshare}
                  onArchive={handleArchive}
                  onDelete={handleDelete}
                />
              ))}
            </>
          )}

          <Pagination
            page={data.page} pages={data.pages} total={data.total}
            onPage={p => loadEntries(p)}
          />

          {selectedIds.size > 0 && (
            <div className="bulk-bar">
              <span className="count"><span className="num">{selectedIds.size}</span> selected</span>
              <button className="btn btn-sm" onClick={() => bulkAction('pin')}>PIN ALL</button>
              <button className="btn btn-sm" onClick={() => bulkAction('unpin')}>UNPIN ALL</button>
              <button className="btn btn-sm" onClick={() => bulkAction('share')}>SHARE ALL</button>
              <button className="btn btn-sm danger" onClick={() => bulkAction('archive')}>ARCHIVE ALL</button>
              <span className="spacer" />
              <button className="btn btn-sm" onClick={() => setSelectedIds(new Set())}>CLEAR</button>
            </div>
          )}
        </main>
      </div>

      {(modalEntry || showNew) && (
        <EntryModal
          entry={modalEntry}
          onClose={() => { setModalEntry(null); setShowNew(false); }}
          onSave={handleSave}
        />
      )}

      {confirm && (
        <ConfirmDialog
          message={confirm.message}
          onConfirm={confirm.onConfirm}
          onCancel={() => setConfirm(null)}
        />
      )}

      {showConflicts && (
        <ConflictsModal
          conflicts={conflictsData}
          onResolve={handleResolveConflict}
          onClose={() => setShowConflicts(false)}
        />
      )}

      {showDreamLog && (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && setShowDreamLog(false)}>
          <div className="modal" style={{width:620,maxWidth:'90vw'}}>
            <h3>DREAMING LOG</h3>
            <div className="dream-log">
              {dreamLog.length === 0 ? (
                <div style={{color:'#447744',padding:20,textAlign:'center'}}>No dreaming runs recorded yet.</div>
              ) : (
                dreamLog.map(d => (
                  <div key={d.id} className="log-row">
                    <div className="log-time">{d.run_at}</div>
                    <div className="log-stats">
                      promote:<span>{d.promoted || (d.details?.promoted || 0)}</span>
                      demote:<span>{d.demoted || (d.details?.demoted || 0)}</span>
                      archive:<span>{d.archived || (d.details?.archived || 0)}</span>
                      purge:<span>{d.purged || (d.details?.purged || 0)}</span>
                      conflicts:<span>{d.conflicts_found || 0}</span>
                    </div>
                  </div>
                ))
              )}
            </div>
            <div className="btn-row">
              <button className="cancel" onClick={() => setShowDreamLog(false)}>CLOSE</button>
            </div>
          </div>
        </div>
      )}

      {showAuditLog && (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && setShowAuditLog(false)}>
          <div className="modal" style={{width:680,maxWidth:'90vw'}}>
            <h3>AUDIT LOG</h3>
            <div className="dream-log">
              {auditLog.length === 0 ? (
                <div style={{color:'#447744',padding:20,textAlign:'center'}}>No operations recorded yet.</div>
              ) : (
                auditLog.map(a => (
                  <div key={a.id} className="log-row">
                    <div className="log-time">{a.created_at}</div>
                    <div className="log-stats">
                      <span style={{color:'#00ff41',textTransform:'uppercase'}}>{a.action}</span>
                      <span>#{a.entry_id}</span>
                      {a.agent_id && <span>[{a.agent_id}]</span>}
                      {a.old_state && <span style={{color:'#6a9a6a'}}>{a.old_state} →</span>}
                      {a.new_state && <span style={{color:'#a0e0a0'}}>{a.new_state}</span>}
                    </div>
                  </div>
                ))
              )}
            </div>
            <div className="btn-row">
              <button className="cancel" onClick={() => setShowAuditLog(false)}>CLOSE</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ToastProvider><App /></ToastProvider>
);
</script>
</body>
</html>
